<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One82 — Portfolio Intelligence for ISOs</title>
  <meta name="description"
    content="Real-time portfolio analytics, AI-powered statement analysis, and per-rep profitability for payment ISOs." />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // One82 Brand Primaries
            brand: {
              bg: '#0a0a14',   // Main dark background
              surface: '#0f0f1a',   // Card / sidebar surface
              elevated: '#131320',   // Elevated card (hover)
              border: '#1e1e30',   // Default border
              muted: '#2a2a40',   // Muted/divider
            },
            primary: {
              50: 'rgb(var(--color-primary-50) / <alpha-value>)',
              100: 'rgb(var(--color-primary-100) / <alpha-value>)',
              500: 'rgb(var(--color-primary-500) / <alpha-value>)',
              600: 'rgb(var(--color-primary-600) / <alpha-value>)',
              700: 'rgb(var(--color-primary-700) / <alpha-value>)',
              800: 'rgb(var(--color-primary-800) / <alpha-value>)',
              900: 'rgb(var(--color-primary-900) / <alpha-value>)',
            },
            // Semantic colors
            profit: '#22c55e',    // Green — money / growth
            loss: '#ef4444',    // Red — churn / risk
            warn: '#f59e0b',    // Amber — medium risk
            info: '#6366f1',    // Indigo — primary brand
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'Menlo', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
            'slide-up': 'slideUp 0.25s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>
  <style>
    /* ─── One82 Brand Base ─────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      /* Default brand: Indigo */
      --color-primary-50: 238 242 255;
      --color-primary-100: 224 231 255;
      --color-primary-500: 99 102 241;
      --color-primary-600: 79 70 229;
      --color-primary-700: 67 56 202;
      --color-primary-800: 55 48 163;
      --color-primary-900: 49 46 129;

      /* Brand spacing */
      --page-padding: 1.5rem;
      --card-radius: 0.75rem;
      --transition: 150ms ease;
    }

    /* Light mode base */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f5f7;
      color: #111827;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Dark mode base — One82 terminal theme */
    .dark body {
      background-color: #0a0a14;
      color: #e2e8f0;
    }

    /* Monospaced numbers — financial data */
    .font-mono,
    .tabular-nums {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-variant-numeric: tabular-nums;
    }

    /* Smooth scrollbar in dark mode */
    .dark ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .dark ::-webkit-scrollbar-track {
      background: #0f0f1a;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #2a2a40;
      border-radius: 3px;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #3a3a55;
    }

    /* Hide scrollbar utility */
    .scrollbar-none {
      scrollbar-width: none;
    }

    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }

    /* Card base used throughout the app */
    .dark .card {
      background: #0f0f1a;
      border: 1px solid #1e1e30;
    }

    /* Number glow effect for hero stats */
    .stat-hero {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    /* Global focus ring */
    *:focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Transition all interactive elements */
    button,
    a,
    input,
    select {
      transition: all var(--transition);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
