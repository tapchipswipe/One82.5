<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One82 — Portfolio Intelligence for ISOs</title>
  <meta name="description"
    content="Real-time portfolio analytics, AI-powered statement analysis, and per-rep profitability for payment ISOs." />

  <!-- Google Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // ONE82 Brand Colors
            brand: {
              charcoal: '#1f2937',
              white: '#ffffff',
              lightgray: '#f3f4f6',
              gray: '#374151',
            },
            primary: {
              50: 'rgb(var(--color-primary-50) / <alpha-value>)',
              100: 'rgb(var(--color-primary-100) / <alpha-value>)',
              500: 'rgb(var(--color-primary-500) / <alpha-value>)',
              600: 'rgb(var(--color-primary-600) / <alpha-value>)',
              700: 'rgb(var(--color-primary-700) / <alpha-value>)',
              800: 'rgb(var(--color-primary-800) / <alpha-value>)',
              900: 'rgb(var(--color-primary-900) / <alpha-value>)',
            },
            // Semantic colors
            profit: '#22c55e',
            loss: '#ef4444',
            warn: '#f59e0b',
            info: '#3b82f6',
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'Menlo', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
            'slide-up': 'slideUp 0.25s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>
  <style>
    /* ─── ONE82 Brand Base ─────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      /* Default brand: Charcoal (ONE82 Brand) */
      --color-primary-50: 249 250 251;
      --color-primary-100: 243 244 246;
      --color-primary-500: 55 65 81;
      --color-primary-600: 31 41 55;
      --color-primary-700: 17 24 39;
      --color-primary-800: 15 23 42;
      --color-primary-900: 12 17 29;

      /* Brand spacing */
      --page-padding: 1.5rem;
      --card-radius: 0.75rem;
      --transition: 150ms ease;
    }

    /* Light mode base — ONE82 clean white theme */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #111827;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Dark mode optional */
    .dark body {
      background-color: #f9fafb;
      color: #111827;
    }

    /* Monospaced numbers — financial data */
    .font-mono,
    .tabular-nums {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-variant-numeric: tabular-nums;
    }

    /* Smooth scrollbar in light mode */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    /* Hide scrollbar utility */
    .scrollbar-none {
      scrollbar-width: none;
    }

    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }

    /* Card base used throughout the app */
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    /* Number glow effect for hero stats */
    .stat-hero {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    /* Global focus ring */
    *:focus-visible {
      outline: 2px solid #1f2937;
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Transition all interactive elements */
    button,
    a,
    input,
    select {
      transition: all var(--transition);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
